name: CI — Build Validation

on:
    push:
        branches: ["**"]
    pull_request:
        branches: [main]

jobs:
    theme:
        name: Theme Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install dependencies
              run: npm install

            - name: Build theme (Next.js)
              run: npm run build
              env:
                  NEXT_PUBLIC_CMS_API_URL: "http://localhost:3001"
