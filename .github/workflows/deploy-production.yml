name: Deploy — Production

# Triggered when main branch is updated.
# Vercel auto-deploys via its GitHub integration.
# This workflow validates the build before Vercel picks it up.

on:
    push:
        branches: [main]

jobs:
    validate:
        name: Validate Production Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install dependencies
              run: npm install

            - name: Build theme (Next.js)
              run: npm run build
              env:
                  NEXT_PUBLIC_CMS_API_URL: "http://localhost:3001"

    notify:
        name: Production Deploy Notice
        runs-on: ubuntu-latest
        needs: validate
        if: success()
        steps:
            - name: Confirm deploy
              run: echo "Build validated. Vercel is deploying to production."
